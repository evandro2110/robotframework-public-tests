name: Robot Framework CI

on:
  pull_request:
    branches: [ master ] # Vai disparar quando houver PR para esta branch

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar auditoria estática (Robocop)
        run: |
          robocop . # A pipeline falha se houver erros graves de padrão

      - name: Rodar Testes Web (Headless Mode)
        run: |
          # Rodando browser no modo headless
          robot -d ./results -v BROWSER:headlesschrome tests/web/sauceDemo/

      - name: Upload dos Resultados e Prints
        if: always() # Garante o upload mesmo se o teste falhar
        uses: actions/upload-artifact@v4
        with:
          name: evidencias-do-teste
          path: |
            ./results/log.html
            ./results/report.html
            ./results/*.png