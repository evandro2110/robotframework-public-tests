name: Robot Framework CI

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Chrome e ChromeDriver
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser
          wget -q -O /tmp/chromedriver.zip https://edgedl.me/chromium-browser/snapshots/Linux_x64/LATEST_RELEASE
          unzip /tmp/chromedriver.zip -d /usr/local/bin/
          chmod +x /usr/local/bin/chromedriver

      - name: Instalar Dependências Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar auditoria estática (Robocop)
        run: robocop tests
        continue-on-error: true

      - name: Rodar Testes Web (Headless Mode)
        run: robot -d ./results -v HEADLESS:true tests/

      - name: Upload dos Resultados e Prints
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidencias-do-teste
          path: |
            ./results/log.html
            ./results/report.html
            ./results/*.png